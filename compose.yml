services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-petal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-petal}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-petal}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-petal}:${POSTGRES_PASSWORD:-devpassword}@db:5432/${POSTGRES_DB:-petal}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:4000}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api}
      NUXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost}
      NUXT_API_PROXY_TARGET: ${NUXT_API_PROXY_TARGET:-http://api:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped

  # Local-dev reverse proxy. Skipped in production (Coolify's Traefik handles ingress + TLS).
  # Run locally with: docker compose --profile local up -d
  caddy:
    image: caddy:2-alpine
    profiles: ["local"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
